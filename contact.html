<body>
  <div class="container">
    <a href="index.html" class="nav-link">← Back to Home</a>
    
    <h1>Get in Touch</h1>
    
    <div class="info-box">
      <h2 style="margin-top: 0;">Contact Us</h2>
      <p>Have questions about Buddy, stud services, or want to discuss breeding? We'd love to hear from you!</p>
    </div>

    <form method="POST" action="https://formspree.io/f/YOUR_FORM_ID">
      <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone">
      </div>

      <div class="form-group">
        <label for="breed">Inquiry Type *</label>
        <select id="breed" name="inquiryType" required>
          <option value="">Select an option</option>
          <option value="stud">Stud Service Inquiry</option>
          <option value="puppies">Puppy Availability</option>
          <option value="breeding">Breeding Partnership</option>
          <option value="general">General Question</option>
          <option value="health">Health Testing Information</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Message *</label>
        <textarea id="message" name="message" required placeholder="Tell us more about your inquiry..."></textarea>
      </div>

      <button type="submit">Send Message</button>
    </form>
